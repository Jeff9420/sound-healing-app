<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="声音疗愈应用 - 聆听大自然的治愈之声，重归内心宁静">
    <meta name="theme-color" content="#4a6741">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="声音疗愈">
    <title>声音疗愈 - 自然之声 (修复版)</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/playlist.css">
</head>
<body>
    <!-- 强制修复提示 -->
    <div id="fixedNotice" style="position: fixed; top: 0; left: 0; width: 100%; background: #4CAF50; color: white; text-align: center; padding: 10px; z-index: 10000; font-weight: bold;">
        🚨 使用强制修复版本 - 播放列表功能已修复 🚨
        <button onclick="document.getElementById('fixedNotice').style.display='none'" style="float: right; background: transparent; border: 1px solid white; color: white; padding: 2px 8px; cursor: pointer;">✖</button>
    </div>
    
    <!-- 云朵背景动效 -->
    <div class="clouds">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
    </div>
    
    <!-- 全屏背景场景画布 -->
    <canvas id="backgroundCanvas" class="background-scene"></canvas>
    
    <header class="nature-header organic-container">
        <div class="tree-logo">
            <div class="tree-trunk"></div>
            <div class="tree-crown"></div>
        </div>
        <h1 class="nature-title">声音疗愈</h1>
        <p class="nature-subtitle">聆听大自然的治愈之声，重归内心宁静</p>
        <div class="season-indicator">
            <div class="season spring" title="春" data-season="spring"></div>
            <div class="season summer" title="夏" data-season="summer"></div>
            <div class="season autumn" title="秋" data-season="autumn"></div>
            <div class="season winter" title="冬" data-season="winter"></div>
        </div>
    </header>

    <!-- 中央池塘播放器 -->
    <div class="pond-player">
        <div class="ripple" style="animation-delay: 0s;"></div>
        <div class="ripple" style="animation-delay: 1s;"></div>
        <div class="ripple" style="animation-delay: 2s;"></div>
        <button id="lotusPlayBtn" class="lotus-player" aria-label="主播放按钮">▶</button>
        <div class="now-playing-info">
            <div class="current-track-name">选择您的疗愈之声</div>
            <div class="current-track-artist">开始您的自然之旅</div>
        </div>
    </div>

    <main class="forest-path">
        <h2 class="path-title">探索声音生态</h2>
        
        <!-- 修复状态显示 -->
        <div id="initStatus" style="margin: 10px 0; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(127, 176, 105, 0.3); text-align: center;">
            <div style="color: #b8e6b8; margin-bottom: 10px;">🔄 应用初始化中，请稍候...</div>
            <div id="statusProgress" style="width: 100%; height: 4px; background: rgba(45, 74, 45, 0.5); border-radius: 2px;">
                <div id="progressBar" style="width: 0%; height: 100%; background: #7fb069; border-radius: 2px; transition: width 0.5s ease;"></div>
            </div>
        </div>

        <!-- 生态系统分类网格 -->
        <div class="ecosystem-grid" id="categoriesContainer">
            <!-- 音频分类将通过JavaScript动态生成为生态系统卡片 -->
        </div>
    </main>

    <!-- 播放列表区域 -->
    <section id="playlistSection" class="playlist-section" style="display: none;">
        <div class="playlist-header organic-container">
            <button id="backToCategories" class="nature-back-btn">🌿 返回生态</button>
            <h3 id="playlistTitle" class="habitat-title">栖息地音频</h3>
            <div class="habitat-controls">
                <button id="shuffleBtn" class="nature-control-btn" title="随机播放">🔀</button>
                <button id="repeatBtn" class="nature-control-btn" title="重复播放">🔁</button>
            </div>
        </div>
        <div class="habitat-player organic-container">
            <div id="currentTrackInfo" class="track-display">
                <span id="currentTrackName" class="track-name">未选择音频</span>
                <div class="track-controls">
                    <button id="prevBtn" class="nature-control-btn">⏮</button>
                    <button id="playPauseBtn" class="nature-control-btn nature-play-main">▶️</button>
                    <button id="nextBtn" class="nature-control-btn">⏭</button>
                </div>
            </div>
            
            <!-- 自然风格进度条 -->
            <div class="nature-progress-section">
                <div class="nature-progress-container">
                    <input type="range" id="progressBar" class="nature-progress-slider" min="0" max="100" value="0">
                </div>
                <div class="nature-time-display">
                    <span id="currentTime">00:00</span>
                    <span id="totalTime">00:00</span>
                </div>
            </div>
            
            <div class="nature-volume-section">
                <span class="nature-label">音量</span>
                <input type="range" id="currentTrackVolume" class="nature-slider" min="0" max="1" step="0.01" value="0.5">
                <span id="currentVolumeDisplay" class="volume-display">50%</span>
            </div>
        </div>
        <div id="trackList" class="habitat-track-list">
            <!-- 播放列表将通过JavaScript动态生成 -->
        </div>
    </section>

    <!-- 自然控制台 -->
    <div class="nature-console">
        <div class="console-content">
            <div class="nature-controls">
                <button id="globalPrevBtn" class="nature-control-btn" title="上一首">⏮</button>
                <button id="globalPlayBtn" class="nature-control-btn" title="播放/暂停">⏸</button>
                <button id="globalNextBtn" class="nature-control-btn" title="下一首">⏭</button>
            </div>

            <div class="nature-slider-group">
                <span class="nature-label">氛围</span>
                <input type="range" id="globalVolume" class="nature-slider" min="0" max="1" step="0.01" value="0.5">
                <span class="volume-value nature-label">50%</span>
            </div>

            <div class="nature-info">
                <span class="weather-icon">🌤️</span>
                <span class="weather-text">晴朗</span>
                <span>•</span>
                <span class="temp-text">23°C</span>
            </div>

            <div class="nature-controls">
                <button id="shuffleModeBtn" class="nature-control-btn" title="随机播放">🔀</button>
                <button id="repeatModeBtn" class="nature-control-btn" title="循环模式">🔁</button>
                <button id="timerBtn" class="nature-control-btn" title="睡眠定时">⏰</button>
            </div>
        </div>
        
        <!-- 隐藏的定时器控制 -->
        <div id="timerControls" class="timer-controls-hidden" style="display: none;">
            <select id="timerDuration" class="nature-select">
                <option value="0">无定时</option>
                <option value="15">15分钟</option>
                <option value="30">30分钟</option>
                <option value="60">60分钟</option>
                <option value="90">90分钟</option>
                <option value="120">120分钟</option>
            </select>
            <button id="timerStartBtn" class="nature-button">开始</button>
            <span id="timerStatus" class="timer-status">未启动</span>
        </div>
    </div>

    <footer class="nature-footer">
        <p>🎧 使用耳机聆听，获得最佳的自然疗愈体验</p>
    </footer>

    <!-- 按照正确顺序加载脚本 -->
    <script src="assets/js/audio-config.js"></script>
    <script src="assets/js/audio-manager.js"></script>
    <script src="assets/js/playlist-ui.js"></script>
    <script src="assets/js/sleep-timer.js"></script>
    <script src="assets/js/visual-effects.js"></script>
    <script src="assets/js/theme-manager.js"></script>
    <script src="assets/js/performance-monitor.js"></script>
    <script src="assets/js/background-scene-manager.js"></script>
    <script src="assets/js/ui-controller.js"></script>
    <script src="assets/js/nature-ui.js"></script>
    <script src="assets/js/app.js"></script>

    <script>
        // 强制修复脚本 - 确保播放列表功能正常工作
        let fixedApp = null;
        let initProgress = 0;
        
        function updateInitProgress(percentage, message) {
            const progressBar = document.getElementById('progressBar');
            const statusDiv = document.getElementById('initStatus');
            
            if (progressBar) {
                progressBar.style.width = percentage + '%';
            }
            
            if (statusDiv && message) {
                const messageDiv = statusDiv.querySelector('div');
                if (messageDiv) {
                    messageDiv.textContent = message;
                }
            }
            
            if (percentage >= 100) {
                setTimeout(() => {
                    if (statusDiv) {
                        statusDiv.style.display = 'none';
                    }
                }, 1000);
            }
        }
        
        function forceCreateEcosystemCards() {
            console.log('🚨 强制创建生态系统卡片...');
            
            const container = document.getElementById('categoriesContainer');
            if (!container) {
                console.error('❌ 容器不存在');
                return;
            }
            
            // 清空容器
            container.innerHTML = '';
            
            // 使用AUDIO_CONFIG直接创建卡片
            if (typeof AUDIO_CONFIG === 'undefined') {
                console.error('❌ AUDIO_CONFIG未加载');
                return;
            }
            
            const ecosystemData = {
                'Animal sounds': { icon: '🦅', name: '森林栖息地', type: '鸟类与动物声' },
                'Chakra': { icon: '🌈', name: '能量场域', type: '脉轮音疗' },
                'Fire': { icon: '🔥', name: '温暖壁炉', type: '火焰与温暖' },
                'hypnosis': { icon: '🌙', name: '梦境花园', type: '催眠引导' },
                'meditation': { icon: '🧘‍♀️', name: '禅境山谷', type: '冥想音乐' },
                'Rain': { icon: '☔', name: '雨林圣地', type: '雨声净化' },
                'running water': { icon: '💧', name: '溪流秘境', type: '流水音律' },
                'Singing bowl sound': { icon: '🎵', name: '颂钵圣殿', type: '音疗颂钵' },
                'Subconscious Therapy': { icon: '🌌', name: '潜识星域', type: '潜意识疗愈' }
            };
            
            Object.entries(ecosystemData).forEach(([categoryKey, data]) => {
                if (!AUDIO_CONFIG.categories[categoryKey]) return;
                
                const count = AUDIO_CONFIG.categories[categoryKey].files?.length || 0;
                
                const card = document.createElement('div');
                card.className = 'ecosystem-card';
                card.dataset.category = categoryKey;
                
                card.innerHTML = `
                    <span class="species-count">${count}种</span>
                    <div class="ecosystem-header">
                        <span class="ecosystem-icon">${data.icon}</span>
                        <div class="ecosystem-info">
                            <h3 class="ecosystem-name">${data.name}</h3>
                            <p class="habitat-type">${data.type}</p>
                        </div>
                    </div>
                    <p class="ecosystem-desc">深入${data.name}，感受自然的治愈力量</p>
                `;
                
                // 强制绑定点击事件
                card.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    console.log(`🔗 强制卡片点击: ${data.name}`);
                    forceOpenPlaylist(categoryKey, data.name);
                });
                
                container.appendChild(card);
                console.log(`✅ 强制创建卡片: ${data.name}`);
            });
            
            console.log(`🚨 强制创建完成！共 ${Object.keys(ecosystemData).length} 个卡片`);
        }
        
        function forceOpenPlaylist(categoryKey, ecosystemName) {
            console.log(`🚨 强制打开播放列表: ${ecosystemName}`);
            
            const mainContainer = document.querySelector('main.forest-path');
            const playlistSection = document.getElementById('playlistSection');
            const titleElement = document.getElementById('playlistTitle');
            const trackList = document.getElementById('trackList');
            
            if (!playlistSection) {
                console.error('❌ 播放列表区域不存在');
                alert('播放列表区域不存在，请刷新页面');
                return;
            }
            
            // 强制隐藏主容器
            if (mainContainer) {
                mainContainer.style.cssText = 'display: none !important;';
            }
            
            // 强制显示播放列表
            playlistSection.style.cssText = `
                display: block !important;
                visibility: visible !important;
                opacity: 1 !important;
                position: fixed !important;
                top: 0px !important;
                left: 0px !important;
                width: 100vw !important;
                height: 100vh !important;
                z-index: 99999 !important;
                background: rgba(26, 46, 26, 0.95) !important;
                backdrop-filter: blur(20px) !important;
                overflow-y: auto !important;
                padding: 2rem !important;
                margin: 0 !important;
                border: none !important;
            `;
            
            playlistSection.classList.add('playlist-active');
            
            // 设置标题
            if (titleElement) {
                titleElement.textContent = ecosystemName;
            }
            
            // 强制生成音轨列表
            if (trackList && AUDIO_CONFIG.categories[categoryKey]) {
                const files = AUDIO_CONFIG.categories[categoryKey].files || [];
                
                trackList.innerHTML = `
                    <div class="track-list" style="display: block !important;">
                        ${files.map((fileName, index) => `
                            <div class="track-item" style="display: block !important; background: rgba(45, 74, 45, 0.6) !important; padding: 1rem !important; margin: 0.5rem 0 !important; border-radius: 12px !important; cursor: pointer !important;">
                                <div class="track-header">
                                    <div class="track-number" style="display: inline-block; width: 28px; height: 28px; background: rgba(127, 176, 105, 0.3); border-radius: 50%; text-align: center; line-height: 28px; color: #f7f4e9; margin-right: 10px;">${index + 1}</div>
                                    <h4 class="track-title" style="display: inline; color: #f7f4e9;">${fileName.replace('.mp3', '').substring(0, 40)}</h4>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                console.log(`✅ 强制生成了 ${files.length} 个音轨`);
            }
            
            // 强制绑定返回按钮
            const backBtn = document.getElementById('backToCategories');
            if (backBtn) {
                backBtn.style.cssText = `
                    display: flex !important;
                    visibility: visible !important;
                    opacity: 1 !important;
                `;
                
                backBtn.onclick = (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    console.log('🔙 强制返回主页面');
                    
                    playlistSection.style.cssText = 'display: none !important;';
                    if (mainContainer) {
                        mainContainer.style.cssText = 'display: block !important;';
                    }
                    
                    playlistSection.classList.remove('playlist-active');
                    console.log('✅ 已返回主页面');
                };
                
                console.log('✅ 强制绑定返回按钮');
            }
            
            // 确保所有子元素可见
            const header = playlistSection.querySelector('.playlist-header');
            const player = playlistSection.querySelector('.habitat-player');
            
            [header, player, trackList].forEach(element => {
                if (element) {
                    element.style.cssText = `
                        display: block !important;
                        visibility: visible !important;
                        opacity: 1 !important;
                    `;
                }
            });
            
            console.log('🚨 强制播放列表已完全激活！');
            
            // 验证显示状态
            setTimeout(() => {
                const rect = playlistSection.getBoundingClientRect();
                console.log(`验证: 播放列表尺寸 ${rect.width}x${rect.height}`);
                
                if (rect.width > 0 && rect.height > 0) {
                    console.log('🎉 播放列表强制显示成功！');
                } else {
                    console.error('❌ 播放列表仍然不可见');
                }
            }, 100);
        }
        
        // 强制初始化流程
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚨 强制修复版本开始初始化...');
            updateInitProgress(10, '🚨 强制修复版本正在初始化...');
            
            try {
                // 等待所有脚本加载完成
                await new Promise(resolve => setTimeout(resolve, 1000));
                updateInitProgress(30, '📚 脚本加载完成...');
                
                // 检查AUDIO_CONFIG
                if (typeof AUDIO_CONFIG === 'undefined') {
                    throw new Error('AUDIO_CONFIG未加载');
                }
                updateInitProgress(50, '✅ 音频配置加载成功...');
                
                // 强制创建生态系统卡片
                forceCreateEcosystemCards();
                updateInitProgress(70, '🌿 生态系统卡片创建完成...');
                
                // 尝试初始化原始应用
                if (typeof SoundHealingApp !== 'undefined') {
                    try {
                        fixedApp = new SoundHealingApp();
                        window.fixedApp = fixedApp;
                        await fixedApp.initialize();
                        updateInitProgress(90, '🎵 音频管理器初始化完成...');
                    } catch (error) {
                        console.warn('原始应用初始化失败，但强制功能已可用:', error.message);
                    }
                }
                
                updateInitProgress(100, '🎉 强制修复版本初始化完成！');
                
                console.log('🚨 强制修复版本初始化完成！');
                console.log('✅ 现在点击任何生态系统卡片应该都能正常工作');
                
            } catch (error) {
                console.error('❌ 强制初始化失败:', error);
                updateInitProgress(0, `❌ 初始化失败: ${error.message}`);
                
                // 即使失败也尝试创建卡片
                setTimeout(() => {
                    forceCreateEcosystemCards();
                }, 1000);
            }
        });
        
        // 添加调试函数
        window.forceTest = function() {
            console.log('🧪 执行强制测试...');
            
            const firstCard = document.querySelector('.ecosystem-card');
            if (firstCard) {
                firstCard.click();
                console.log('✅ 强制点击第一个卡片');
            } else {
                console.log('❌ 没有找到卡片，重新创建...');
                forceCreateEcosystemCards();
            }
        };
        
        // 3秒后自动运行测试
        setTimeout(() => {
            console.log('🕐 3秒后自动测试...');
            window.forceTest();
        }, 3000);
    </script>
</body>
</html>
