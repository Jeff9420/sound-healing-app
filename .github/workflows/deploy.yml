name: Deploy to Vercel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install Vercel CLI
      run: npm install -g vercel@latest
      
    - name: Pull Vercel environment
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Build project
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Deploy to Vercel
      id: deploy
      run: |
        url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
        echo "Preview URL: $url"
        echo "::set-output name=url::$url"
        
    - name: Comment deployment URL
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 Deployment successful! Preview at: ${{ steps.deploy.outputs.url }}`
          })

  lighthouse:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v9
      with:
        urls: |
          https://your-domain.vercel.app
        configPath: './.lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true

  seo-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: SEO Analysis
      run: |
        echo "🔍 Running SEO checks..."
        
        # Check if sitemap exists
        if [ -f "sitemap.xml" ]; then
          echo "✅ Sitemap found"
        else
          echo "❌ Sitemap missing"
        fi
        
        # Check if robots.txt exists  
        if [ -f "robots.txt" ]; then
          echo "✅ Robots.txt found"
        else
          echo "❌ Robots.txt missing"
        fi
        
        # Check meta tags in HTML
        if grep -q "meta.*description" index.html; then
          echo "✅ Meta description found"
        else
          echo "❌ Meta description missing"
        fi
        
        if grep -q "meta.*keywords" index.html; then
          echo "✅ Meta keywords found"
        else
          echo "❌ Meta keywords missing"
        fi
        
        echo "🎯 SEO check completed"